<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracklist — SVTracks</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="floating-notes">
    <span class="note" style="left:5%; animation-delay:0s;">🎵</span>
    <span class="note" style="left:15%; animation-delay:1s;">🎶</span>
    <span class="note" style="left:30%; animation-delay:2s;">🎵</span>
    <span class="note" style="left:50%; animation-delay:0.5s;">⭐</span>
    <span class="note" style="left:65%; animation-delay:1.5s;">🎶</span>
    <span class="note" style="left:80%; animation-delay:3s;">🎵</span>
    <span class="note" style="left:90%; animation-delay:2.5s;">💙</span>
  </div>

  <header>
    <nav>
      <span class="nav__logo">SVTracks</span>
      <div class="nav__links">
        <a href="index.html">Search</a>
        <a href="members.html" >Profiles</a>
        <a href="tracklist.html" class="active">Saved</a>
      </div>
    </nav>
  </header>

  <main>

    <section>
      <h1>My Tracklist</h1>
      <p id="saved-empty" hidden>Nothing saved yet.</p>
      <div id="tracklist-grid"></div>
    </section>

  </main>

  <footer>
    <!-- footer content -->
     <p>&copy; 2026 SVTracks. All rights reserved.</p>
  </footer>

  <script type="module" src="js/tracklist.js"></script>

</html>
