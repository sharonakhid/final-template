<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVTracks</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">SVTracks</span>
      <div class="nav__links">
        <a href="index.html" class="active">Search</a>
        <a href="members.html">Profiles</a>
        <a href="tracklist.html">Saved</a>
      </div>
    </nav>
  </header>

  <main>

    <!-- search / filter form -->
    <section>
      <h1>Discover SVT Songs</h1>
      <h2>Search by song, albums or unit</h2>
      <form id="search-form">
        <!-- add your inputs here (at least 3 different types) -->
         <label for="searchbar">Search:</label>
         <input type="text" id="searchbar" name="query" placeholder="Search for songs, artists, albums..." required>
         <button type="submit">Search</button>
         <label for="sort-select">Sort by:</label>
         <select id="sort-select" name="sort">
          <option value="default">Default</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="newest">Newest First</option>
         </select>
      </form>
      <div class="filters">
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="All" checked>
            All
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="Vocal">
            Vocal
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="hiphop">
            Hip-Hop
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="performance">
            Performance
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="jxw">
            JxW
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="hxw">
            HxW
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="cxm">
            CxM
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="dxs">
            DxS
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="bss">
            BSS
          </label>
          <label class="filter__pill">
            <input type="radio" name="unit-filter" value="leaderz">
            Leaderz
          </label>
        </div>
    </section>
    <section>
      <h2>Top Rated</h2>
      <div class="cards-grid">

        <article class="card">
          <img src="https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/f0/69/16/f0691679-835f-8b9b-5baa-292b7e49423f/196922894992_Cover.jpg/600x600bb.jpg" alt="Maestro album cover">
          <div class="card__body">
            <h3>Maestro</h3>
            <p>17 is right here · 2024</p>
            <button type="button">+ Save</button>
          </div>
        </article>
        <article class="card">
          <img src="https://is1-ssl.mzstatic.com/image/thumb/Music116/v4/d1/66/eb/d166eb7e-7210-b3ff-be39-638cd37bfc89/196922401282_Cover.jpg/600x600bb.jpg" alt="Super album cover">
          <div class="card__body">
            <h3>Super</h3>
            <p>FML · 2023</p>
            <button type="button">+ Save</button>
          </div>
        </article>
        <article class="card">
          <img src="https://is1-ssl.mzstatic.com/image/thumb/Music221/v4/bc/64/e0/bc64e097-7ab4-5650-ed66-61a6b836370c/198704749377_Cover.jpg/600x600bb.jpg" alt="Thunder album cover">
          <div class="card__body">
            <h3>Thunder</h3>
            <p>Happy Burstday · 2025</p>
            <button type="button">+ Save</button>
          </div>
        </article>

      </div>
    </section>

    <!-- loading and error states -->
    <p id="loading-msg" hidden>Loading…</p>
    <p id="error-msg" hidden></p>

    <!-- dynamically generated cards land here -->
    <section>
      <div id="results-grid"></div>
    </section>

  </main>

  <footer>
    <!-- footer content -->
     <p>&copy; 2026 SVTracks. All rights reserved.</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
